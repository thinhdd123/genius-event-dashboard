<title>Genius · Daily Event Console</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root{
    --ground:#EEF1F6; --panel:#FFFFFF; --panel-2:#F4F6F9; --line:#E2E7EF;
    --text:#1B2530; --muted:#5C6A7A; --faint:#94A1B2;
    --mint:#0EA5A4; --amber:#D97706; --violet:#7C3AED; --blue:#2563EB;
    --pos:#15A34A; --neg:#DC2626;
    --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,monospace;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{margin:0;background:var(--ground);color:var(--text);font-family:var(--sans);
    font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;
    background-image:radial-gradient(1100px 520px at 85% -10%,rgba(26,115,232,.05),transparent 60%);}
  a{color:inherit}
  .wrap{max-width:1280px;margin:0 auto;padding:24px 20px 64px}

  /* header */
  header{display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;
    gap:16px;padding-bottom:20px;border-bottom:1px solid var(--line);margin-bottom:24px}
  .brand{display:flex;align-items:baseline;gap:14px}
  .dot{width:11px;height:11px;border-radius:50%;background:var(--mint);
    box-shadow:0 0 14px var(--mint);transform:translateY(-1px)}
  h1{font-size:21px;font-weight:680;letter-spacing:-.02em;margin:0}
  h1 span{color:var(--muted);font-weight:500}
  .meta{font-family:var(--mono);font-size:11.5px;color:var(--faint);text-align:right;line-height:1.7}
  .meta b{color:var(--muted);font-weight:600}

  /* controls */
  .controls{display:flex;flex-wrap:wrap;align-items:center;gap:10px;margin-bottom:22px}
  .seg{display:inline-flex;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:3px}
  .seg button{appearance:none;border:0;background:transparent;color:var(--muted);
    font-family:var(--mono);font-size:12px;font-weight:600;padding:6px 13px;border-radius:7px;
    cursor:pointer;letter-spacing:.02em;transition:.15s}
  .seg button:hover{color:var(--text)}
  .seg button[aria-pressed=true]{background:var(--panel-2);color:var(--mint);
    box-shadow:inset 0 0 0 1px var(--line)}
  .ctl-label{font-family:var(--mono);font-size:11px;color:var(--faint);
    text-transform:uppercase;letter-spacing:.12em;margin-right:2px}
  .grow{flex:1}

  /* kpi grid */
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
  .kpi{background:var(--panel);box-shadow:0 1px 2px rgba(16,24,40,.04);
    border:1px solid var(--line);border-radius:14px;padding:15px 16px 13px;position:relative;overflow:hidden}
  .kpi .k-label{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.04em;
    text-transform:uppercase;display:flex;align-items:center;gap:6px}
  .k-label i{width:7px;height:7px;border-radius:2px;display:inline-block}
  .kpi .k-val{font-family:var(--mono);font-size:27px;font-weight:600;letter-spacing:-.02em;
    margin:7px 0 2px;font-variant-numeric:tabular-nums}
  .kpi .k-sub{font-family:var(--mono);font-size:11.5px;color:var(--faint);
    display:flex;align-items:center;gap:7px;font-variant-numeric:tabular-nums}
  .delta{font-weight:600}
  .delta.up{color:var(--pos)} .delta.down{color:var(--neg)} .delta.flat{color:var(--faint)}
  .kpi .spark{position:absolute;right:12px;bottom:11px;opacity:.85}

  /* panels */
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:16px;
    padding:18px 20px 20px;margin-bottom:20px;box-shadow:0 1px 2px rgba(16,24,40,.04)}
  .panel-head{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;
    gap:12px;margin-bottom:6px}
  .panel-head h2{font-size:13px;font-weight:680;letter-spacing:.02em;margin:0;
    text-transform:uppercase}
  .panel-head h2 small{color:var(--faint);font-weight:500;text-transform:none;
    letter-spacing:0;margin-left:8px;font-size:12px}

  /* series chips */
  .chips{display:flex;flex-wrap:wrap;gap:7px}
  .chip{display:inline-flex;align-items:center;gap:7px;background:var(--panel-2);
    border:1px solid var(--line);border-radius:20px;padding:5px 11px 5px 9px;cursor:pointer;
    font-size:12px;font-weight:600;color:var(--muted);transition:.15s;user-select:none}
  .chip:hover{color:var(--text)}
  .chip[aria-pressed=true]{color:var(--text);border-color:transparent}
  .chip i{width:9px;height:9px;border-radius:50%;background:var(--c,var(--faint))}
  .chip[aria-pressed=true]{background:color-mix(in srgb,var(--c) 16%,var(--panel-2));
    box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--c) 45%,transparent)}

  .chart-host{position:relative;margin-top:10px}
  svg{display:block;width:100%}
  .tt{position:absolute;pointer-events:none;background:#FFFFFF;border:1px solid var(--line);
    border-radius:9px;padding:9px 11px;font-family:var(--mono);font-size:11.5px;
    box-shadow:0 12px 32px rgba(16,24,40,.16);opacity:0;transition:opacity .1s;z-index:5;min-width:120px}
  .tt .tt-d{color:var(--faint);margin-bottom:5px;font-size:10.5px;letter-spacing:.04em}
  .tt .tt-r{display:flex;align-items:center;justify-content:space-between;gap:14px;line-height:1.7}
  .tt .tt-r b{font-variant-numeric:tabular-nums}
  .tt-r em{font-style:normal;color:var(--muted);display:flex;align-items:center;gap:6px}
  .tt-r em i{width:8px;height:8px;border-radius:50%}

  /* funnel */
  .funnel{display:flex;flex-direction:column;gap:3px;margin-top:14px}
  .fstep{display:grid;grid-template-columns:170px 1fr 132px;align-items:center;gap:14px}
  .fstep .f-name{font-size:12.5px;color:var(--muted);font-weight:600}
  .fstep .f-name b{display:block;color:var(--faint);font-weight:500;font-size:11px;
    font-family:var(--mono);margin-top:1px}
  .f-bar-track{height:34px;background:var(--panel-2);border-radius:8px;overflow:hidden;position:relative}
  .f-bar{height:100%;border-radius:8px;background:linear-gradient(90deg,
    color-mix(in srgb,var(--mint) 70%,var(--blue)),var(--mint));
    display:flex;align-items:center;padding-left:12px;min-width:42px;transition:width .5s cubic-bezier(.3,.9,.3,1)}
  .f-bar span{font-family:var(--mono);font-size:13px;font-weight:600;color:#06231C;
    font-variant-numeric:tabular-nums}
  .f-conv{font-family:var(--mono);font-size:12px;text-align:right;color:var(--muted);
    font-variant-numeric:tabular-nums}
  .f-conv .drop{color:var(--neg);font-size:11px;display:block}

  /* table */
  .tbl-controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:12px 0 4px}
  .search{flex:1;min-width:180px;background:var(--panel-2);border:1px solid var(--line);
    border-radius:9px;padding:8px 12px;color:var(--text);font-family:var(--mono);font-size:12.5px}
  .search::placeholder{color:var(--faint)}
  select.grp{background:var(--panel-2);border:1px solid var(--line);border-radius:9px;
    padding:8px 11px;color:var(--text);font-size:12.5px;font-family:var(--mono);cursor:pointer}
  .tbl-scroll{overflow-x:auto;margin-top:6px}
  table{width:100%;border-collapse:collapse;min-width:620px}
  th{font-size:10.5px;text-transform:uppercase;letter-spacing:.1em;color:var(--faint);
    text-align:right;padding:9px 10px;border-bottom:1px solid var(--line);font-weight:600;
    cursor:pointer;white-space:nowrap}
  th:first-child,td:first-child{text-align:left}
  th[data-sort]:hover{color:var(--muted)}
  th .arr{color:var(--mint)}
  td{padding:8px 10px;border-bottom:1px solid #EDF0F5;font-family:var(--mono);font-size:12.5px;
    text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
  tr.ev-row{cursor:pointer}
  tr.ev-row:hover td{background:var(--panel-2)}
  tr.active td{background:color-mix(in srgb,var(--mint) 9%,transparent)}
  .ev-name{display:flex;align-items:center;gap:9px}
  .ev-name .gtag{font-size:9.5px;color:var(--faint);text-transform:uppercase;letter-spacing:.06em}
  .ev-name b{font-weight:600;color:var(--text)}
  .grp-badge{display:inline-block;width:7px;height:7px;border-radius:2px}
  td .d{font-size:11.5px}
  td .d.up{color:var(--pos)} td .d.down{color:var(--neg)} td .d.flat{color:var(--faint)}
  .hint{font-family:var(--mono);font-size:11px;color:var(--faint);margin-top:10px}
  .empty{color:var(--faint);text-align:center;padding:26px;font-family:var(--mono);font-size:12px}

  @media(max-width:880px){
    .kpis{grid-template-columns:repeat(2,1fr)}
    .fstep{grid-template-columns:120px 1fr 92px;gap:9px}
    .meta{text-align:left}
  }
  @media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>

  </div>

const D = DATA.days, N = D.length;
const fmt = n => n>=1e6?(n/1e6).toFixed(n>=1e7?0:1)+'M':n>=1e4?(n/1e3).toFixed(0)+'k':n>=1000?(n/1e3).toFixed(1)+'k':String(n);
const fmtFull = n => n.toLocaleString('en-US');
const sum = a => a.reduce((s,x)=>s+x,0);
const COLORS = {dau:'var(--mint)',new_users:'var(--violet)',sessions:'var(--amber)',total_events:'var(--blue)'};
const RAW = {dau:'#0EA5A4',new_users:'#7C3AED',sessions:'#D97706',total_events:'#2563EB'};
const EVPAL = ['#DB2777','#16A34A','#2563EB','#EA580C','#9333EA','#0891B2','#CA8A04'];

// ---------- period window ----------
let period = 28;                       // 0 = all
let series = new Set(['dau','sessions','new_users']);   // active trend series
let extraEvents = [];                  // [{name,color}] plotted from table
let sortKey='events', sortDir=-1, search='', grpFilter='';

function win(){                        // returns [start,end] inclusive indices for current period
  const end = N-1;
  const start = period===0 ? 0 : Math.max(0, end-period+1);
  return [start,end];
}
function prevWin(){
  const [s,e]=win(); const len=e-s+1;
  const pe=s-1, ps=Math.max(0,pe-len+1);
  return pe<0 ? null : [ps,pe];
}

// ---------- KPI definitions ----------
function evSeries(name){ const o=DATA.events[name]; return o?o.e:new Array(N).fill(0); }
function evUsers(name){ const o=DATA.events[name]; return o?o.u:new Array(N).fill(0); }

const KPIS = [
  {key:'dau',   label:'Avg DAU',      color:RAW.dau,    avg:true,  get:()=>DATA.totals.dau},
  {key:'new',   label:'New users',    color:RAW.new_users,        get:()=>DATA.totals.new_users},
  {key:'ses',   label:'Sessions',     color:RAW.sessions,         get:()=>DATA.totals.sessions},
  {key:'evt',   label:'Total events', color:RAW.total_events,     get:()=>DATA.totals.total_events},
  {key:'gen',   label:'Generations',  color:'#16A34A', get:()=>evSeries('service_request'), ev:'service_request'},
  {key:'pw',    label:'Paywall views',color:'#EA580C', get:()=>evSeries('iap_view'),        ev:'iap_view'},
  {key:'buy',   label:'Purchases',    color:'#DB2777', get:()=>evSeries('iap_successful'),  ev:'iap_successful'},
  {key:'cvr',   label:'Purchase CVR', color:'#7C3AED', pct:true,
     get:()=>DATA.totals.dau, // placeholder; computed specially
     special:'cvr'},
];

function windowVal(arr,[s,e],avg){ const sl=arr.slice(s,e+1); return avg? (sl.length?sum(sl)/sl.length:0): sum(sl); }

function renderKPIs(){
  const w=win(), p=prevWin();
  const host=document.getElementById('kpis'); host.innerHTML='';
  for(const k of KPIS){
    let cur, prev=null, sub, sparkArr;
    if(k.special==='cvr'){
      const buyW=windowVal(evSeries('iap_successful'),w), pwW=windowVal(evSeries('iap_view'),w);
      cur = pwW? (buyW/pwW*100):0;
      if(p){const buyP=windowVal(evSeries('iap_successful'),p), pwP=windowVal(evSeries('iap_view'),p); prev=pwP?(buyP/pwP*100):0;}
      sparkArr = DATA.totals.dau.map((_,i)=>{const v=evSeries('iap_view')[i];return v?evSeries('iap_successful')[i]/v*100:0;});
      sub = `${fmtFull(Math.round(buyW))} / ${fmtFull(Math.round(pwW))}`;
    } else {
      const arr=k.get();
      cur = windowVal(arr,w,k.avg);
      if(p) prev = windowVal(arr,p,k.avg);
      sparkArr = arr;
    }
    const valTxt = k.pct? cur.toFixed(1)+'%' : (k.avg? fmtFull(Math.round(cur)) : fmtFull(cur));
    let deltaHtml='';
    if(prev!=null){
      const diff = cur-prev; const pctd = prev? diff/prev*100 : (cur?100:0);
      const cls = Math.abs(pctd)<0.5?'flat':(diff>0?'up':'down');
      const sign = diff>0?'+':'';
      deltaHtml = `<span class="delta ${cls}">${sign}${pctd.toFixed(0)}%</span>`;
    }
    if(!k.special && !k.pct) sub = sub||'';
    const card=document.createElement('div'); card.className='kpi';
    card.innerHTML = `<div class="k-label"><i style="background:${k.color}"></i>${k.label}</div>
      <div class="k-val">${valTxt}</div>
      <div class="k-sub">${deltaHtml}${k.special==='cvr'?`<span>${sub}</span>`:''}</div>
      <div class="spark">${sparkline(sparkArr.slice(w[0],w[1]+1),k.color)}</div>`;
    host.appendChild(card);
  }
}

function sparkline(arr,color){
  const W=78,H=26,n=arr.length; if(n<2) return '';
  const mx=Math.max(...arr,1);
  const pts=arr.map((v,i)=>`${(i/(n-1)*W).toFixed(1)},${(H-2 - v/mx*(H-4)).toFixed(1)}`).join(' ');
  return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" opacity=".9" stroke-linejoin="round"/></svg>`;
}

// ---------- trend chart ----------
function seriesArr(id){
  if(DATA.totals[id]) return DATA.totals[id];
  return evSeries(id);
}
function renderChips(){
  const host=document.getElementById('series-chips'); host.innerHTML='';
  const base=[['dau','DAU'],['new_users','New users'],['sessions','Sessions'],['total_events','Events']];
  for(const [id,lab] of base){
    const b=document.createElement('button'); b.className='chip';
    b.style.setProperty('--c',RAW[id]); b.setAttribute('aria-pressed',series.has(id));
    b.innerHTML=`<i></i>${lab}`;
    b.onclick=()=>{ series.has(id)?series.delete(id):series.add(id); renderChips(); drawChart(); };
    host.appendChild(b);
  }
  extraEvents.forEach(ex=>{
    const b=document.createElement('button'); b.className='chip'; b.setAttribute('aria-pressed','true');
    b.style.setProperty('--c',ex.color);
    b.innerHTML=`<i></i>${ex.name} ✕`;
    b.onclick=()=>{ extraEvents=extraEvents.filter(e=>e.name!==ex.name); renderChips(); drawChart(); renderTable(); };
    host.appendChild(b);
  });
}
function activeSeries(){
  const out=[];
  for(const id of ['dau','new_users','sessions','total_events']) if(series.has(id))
    out.push({id,name:{dau:'DAU',new_users:'New users',sessions:'Sessions',total_events:'Events'}[id],color:RAW[id],arr:seriesArr(id)});
  extraEvents.forEach(ex=>out.push({id:ex.name,name:ex.name,color:ex.color,arr:evSeries(ex.name)}));
  return out;
}
const CW=1000, CH=340, PADL=46, PADR=14, PADT=16, PADB=30;
function drawChart(){
  const svg=document.getElementById('chart'); const ser=activeSeries();
  const [ws,we]=win();
  let mx=1; ser.forEach(s=>s.arr.forEach(v=>{if(v>mx)mx=v;}));
  // nice round max
  const pow=Math.pow(10,Math.floor(Math.log10(mx))); mx=Math.ceil(mx/pow)*pow; if(mx<4)mx=Math.ceil(mx);
  const X=i=> PADL + (N<2?0:i/(N-1))*(CW-PADL-PADR);
  const Y=v=> PADT + (1-v/mx)*(CH-PADT-PADB);
  let g='';
  // window shading
  g+=`<rect x="${X(ws).toFixed(1)}" y="${PADT}" width="${(X(we)-X(ws)).toFixed(1)}" height="${CH-PADT-PADB}" fill="rgba(26,115,232,.07)"/>`;
  // y gridlines
  for(let t=0;t<=4;t++){ const v=mx*t/4, y=Y(v);
    g+=`<line x1="${PADL}" y1="${y.toFixed(1)}" x2="${CW-PADR}" y2="${y.toFixed(1)}" stroke="#E6EAF1" stroke-width="1"/>`;
    g+=`<text x="${PADL-8}" y="${(y+3.5).toFixed(1)}" fill="#94A1B2" font-size="11" font-family="ui-monospace,Menlo,monospace" text-anchor="end">${fmt(Math.round(v))}</text>`;
  }
  // x labels (~6)
  const step=Math.max(1,Math.round(N/6));
  for(let i=0;i<N;i+=step){ const d=D[i].slice(5);
    g+=`<text x="${X(i).toFixed(1)}" y="${CH-9}" fill="#94A1B2" font-size="10.5" font-family="ui-monospace,Menlo,monospace" text-anchor="middle">${d}</text>`;
  }
  // lines
  ser.forEach(s=>{
    const pts=s.arr.map((v,i)=>`${X(i).toFixed(1)},${Y(v).toFixed(1)}`).join(' ');
    g+=`<polyline points="${pts}" fill="none" stroke="${s.color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" opacity=".95"/>`;
  });
  // hover layer
  g+=`<line id="cross" x1="0" y1="${PADT}" x2="0" y2="${CH-PADB}" stroke="#B6C0D0" stroke-width="1" opacity="0"/>`;
  svg.innerHTML=g;
  // store geometry for hover
  svg._geom={X,Y,ser,mx,ws,we};
}
// hover tooltip
(function(){
  const svg=document.getElementById('chart'), tt=document.getElementById('tt');
  svg.addEventListener('mousemove',e=>{
    const g=svg._geom; if(!g) return;
    const r=svg.getBoundingClientRect(); const px=(e.clientX-r.left)/r.width*CW;
    let i=Math.round((px-PADL)/((CW-PADL-PADR))*(N-1)); i=Math.max(0,Math.min(N-1,i));
    const cross=svg.querySelector('#cross');
    const xx=g.X(i); if(cross){cross.setAttribute('x1',xx);cross.setAttribute('x2',xx);cross.setAttribute('opacity','.5');cross.setAttribute('stroke','#B6C0D0');}
    let rows=g.ser.map(s=>`<div class="tt-r"><em><i style="background:${s.color}"></i>${s.name}</em><b>${fmtFull(s.arr[i])}</b></div>`).join('');
    tt.innerHTML=`<div class="tt-d">${D[i]}</div>${rows}`;
    tt.style.opacity=1;
    const tx=(xx/CW)*r.width; const left=Math.min(Math.max(tx+12,0), r.width-150);
    tt.style.left=left+'px'; tt.style.top='8px';
  });
  svg.addEventListener('mouseleave',()=>{tt.style.opacity=0; const c=svg.querySelector('#cross'); if(c)c.setAttribute('opacity',0);});
})();

// ---------- funnel ----------
const FUNNEL=[
  ['Splash viewed','splash_view'],
  ['Onboarding complete','showcase_6_flow_1_complete'],
  ['Home viewed','home_view'],
  ['Generate request','service_request'],
  ['Generate response','service_response'],
  ['Paywall viewed','iap_view'],
  ['Purchase','iap_successful'],
];
function renderFunnel(){
  const w=win(); const host=document.getElementById('funnel'); host.innerHTML='';
  const vals=FUNNEL.map(([lab,ev])=>({lab,ev,v:windowVal(evSeries(ev),w)}));
  const top=Math.max(...vals.map(s=>s.v),1);   // widest bar = largest step
  const base=vals[0].v;                          // entry step for share %
  vals.forEach((s,i)=>{
    const barW=Math.max(s.v/top*100,2);
    const prev=i>0?vals[i-1].v:0;
    const share = i===0 ? '100%' : (base>0 ? (s.v/base*100).toFixed(0)+'%' : '—');
    const drop = (prev>0 && s.v<prev) ? (100-s.v/prev*100) : null;
    const row=document.createElement('div'); row.className='fstep';
    row.innerHTML=`<div class="f-name">${s.lab}<b>${s.ev}</b></div>
      <div class="f-bar-track"><div class="f-bar" style="width:${barW.toFixed(1)}%"><span>${fmtFull(s.v)}</span></div></div>
      <div class="f-conv">${share}${drop!=null?`<span class="drop">−${drop.toFixed(0)}% vs prev</span>`:''}</div>`;
    host.appendChild(row);
  });
}

// ---------- event explorer ----------
function renderGroupFilter(){
  const sel=document.getElementById('grp-filter');
  DATA.groups.forEach(g=>{ const o=document.createElement('option'); o.value=g.id; o.textContent=g.label; sel.appendChild(o);});
}
const GCOLOR={splash:'#2563EB',onboarding:'#7C3AED',paywall:'#DB2777',home:'#0EA5A4',
  enhance:'#16A34A',i2i:'#EA580C',i2v:'#D97706',seedance2:'#0891B2',tryon:'#9333EA',
  wclooks:'#CA8A04',wcvideo:'#2563EB',service:'#DC2626',auto:'#94A1B2',other:'#94A1B2'};
const GLABEL=Object.fromEntries(DATA.groups.map(g=>[g.id,g.label]));

function renderTable(){
  const w=win(), p=prevWin();
  let rows=Object.entries(DATA.events).map(([name,o])=>{
    const ev=windowVal(o.e,w), us=windowVal(o.u,w);
    const pe = p? windowVal(o.e,p):null;
    const delta = pe!=null? (pe? (ev-pe)/pe*100 : (ev?100:0)) : null;
    return {name,g:o.g,ev,us,delta,arr:o.e};
  });
  if(grpFilter) rows=rows.filter(r=>r.g===grpFilter);
  if(search) rows=rows.filter(r=>r.name.toLowerCase().includes(search));
  rows=rows.filter(r=>r.ev>0 || search || grpFilter);
  rows.sort((a,b)=>{
    let x,y;
    if(sortKey==='name'){x=a.name;y=b.name;return sortDir*(x<y?-1:x>y?1:0);}
    if(sortKey==='delta'){x=a.delta??-1e9;y=b.delta??-1e9;}
    else {x=a[sortKey==='events'?'ev':'us'];y=b[sortKey==='events'?'ev':'us'];}
    return sortDir*(x-y);
  });
  const tb=document.getElementById('tbody'); tb.innerHTML='';
  document.getElementById('ev-count').textContent = `${rows.length} events · window ${D[w[0]].slice(5)}→${D[w[1]].slice(5)}`;
  if(!rows.length){ tb.innerHTML='<tr><td colspan="5" class="empty">No events match this filter.</td></tr>'; return; }
  const plotted=new Set(extraEvents.map(e=>e.name));
  for(const r of rows){
    const tr=document.createElement('tr'); tr.className='ev-row'+(plotted.has(r.name)?' active':'');
    let dc='flat',dt='—';
    if(r.delta!=null){ dc=Math.abs(r.delta)<0.5?'flat':(r.delta>0?'up':'down'); dt=(r.delta>0?'+':'')+r.delta.toFixed(0)+'%'; }
    tr.innerHTML=`<td><div class="ev-name"><span class="grp-badge" style="background:${GCOLOR[r.g]}"></span>
        <span><b>${r.name}</b> <span class="gtag">${GLABEL[r.g]}</span></span></div></td>
      <td>${fmtFull(r.ev)}</td><td>${fmtFull(r.us)}</td>
      <td class="d ${dc}">${dt}</td>
      <td>${sparkline(r.arr.slice(w[0],w[1]+1),GCOLOR[r.g])}</td>`;
    tr.onclick=()=>toggleEvent(r.name);
    tb.appendChild(tr);
  }
}
function toggleEvent(name){
  const ex=extraEvents.find(e=>e.name===name);
  if(ex){ extraEvents=extraEvents.filter(e=>e.name!==name); }
  else { const used=new Set(extraEvents.map(e=>e.color));
    const color=EVPAL.find(c=>!used.has(c))||EVPAL[extraEvents.length%EVPAL.length];
    extraEvents.push({name,color}); }
  renderChips(); drawChart(); renderTable();
}

// ---------- wiring ----------
function renderAll(){ renderKPIs(); renderFunnel(); drawChart(); renderTable(); updTrendRange(); }
function updTrendRange(){
  const [s,e]=win();
  document.getElementById('trend-range').textContent=`${D[0]} → ${D[N-1]} · full ${N} days, window shaded`;
}
document.getElementById('period').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b) return;
  period=+b.dataset.p;
  [...e.currentTarget.children].forEach(x=>x.setAttribute('aria-pressed',x===b));
  renderKPIs(); renderFunnel(); drawChart(); renderTable();
});
document.getElementById('search').addEventListener('input',e=>{search=e.target.value.toLowerCase().trim();renderTable();});
document.getElementById('grp-filter').addEventListener('change',e=>{grpFilter=e.target.value;renderTable();});
document.querySelectorAll('th[data-sort]').forEach(th=>{
  th.addEventListener('click',()=>{
    const k=th.dataset.sort;
    if(sortKey===k) sortDir*=-1; else {sortKey=k; sortDir=(k==='name')?1:-1;}
    document.querySelectorAll('th').forEach(x=>x.querySelector('.arr')?.remove());
    th.insertAdjacentHTML('beforeend',` <span class="arr">${sortDir<0?'▾':'▴'}</span>`);
    renderTable();
  });
});
document.getElementById('meta').innerHTML =
  `<b>${D[0]}</b> → <b>${D[N-1]}</b> · ${N} days<br>${Object.keys(DATA.events).length} events tracked · built ${DATA.generated_at}`;

renderChips(); renderGroupFilter(); renderAll();
</script>
